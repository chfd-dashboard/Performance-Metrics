name: Render report charts
on:
  schedule:
    - cron: '30 13 * * 4'   # Thursdays ~7:30 AM Central
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: render-charts
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm i playwright@1
          npx playwright install --with-deps chromium
      - name: Render the two 7-day charts
        run: node render-charts.js
      - name: Commit updated charts
        run: |
          git config user.name  "chfd-charts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add charts/turnout-7day.png charts/training-7day.png
          if git diff --staged --quiet; then
            echo "No chart changes."
          else
            git commit -m "charts: refresh 7-day report images [skip ci]"
            git push
          fi
